{% extends "admin/base.html" %}
{% block title %}Change password{% endblock %}
{% block admin_content %}
<header class="admin-header"><div><p class="eyebrow violet"><i></i> Security</p><h1>Change password</h1></div></header>
<section class="admin-card password-card"><form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><label>Current password<input type="password" name="current_password" required></label><label>New password<input type="password" name="new_password" minlength="12" required></label><label>Confirm new password<input type="password" name="confirm_password" minlength="12" required></label><button class="button dark-button">Update password</button></form></section>
{% endblock %}
